x-cca-server-image: &cca-server-image
  build:
    context: .
    dockerfile: Dockerfile
  image: contextauthlab/server:${VERSION:-latest}

x-cca-server-volumes: &cca-server-volumes
  - ${DATA_VOLUME:-./data/paper}:/data/paper:rw
  - ${LOG_VOLUME:-./logs}:/app/logs:rw

services:
  cca-server-init:
    <<: *cca-server-image
    container_name: cca-server-init
    user: "0:0"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "mkdir -p /data/paper /app/logs && if [ \"${SERVER_FIX_PERMISSIONS:-true}\" = \"true\" ]; then if [ \"${SERVER_CHOWN_RECURSIVE:-true}\" = \"true\" ]; then chown -R ${SERVER_CONTAINER_UID:-1000}:${SERVER_CONTAINER_GID:-1000} /data/paper /app/logs && chmod -R u+rwX,g+rwX /data/paper /app/logs; else chown ${SERVER_CONTAINER_UID:-1000}:${SERVER_CONTAINER_GID:-1000} /data/paper /app/logs && chmod u+rwX,g+rwX /data/paper /app/logs; fi; fi"
    volumes: *cca-server-volumes
    restart: "no"

  cca-server:
    <<: *cca-server-image
    container_name: cca-server
    restart: unless-stopped
    depends_on:
      cca-server-init:
        condition: service_completed_successfully
    environment:
      SERVER_DATA_DIR: /data/paper
      SERVER_LOG_DIR: /app/logs
      SERVER_RULES_FILE: ${SERVER_RULES_FILE:-/data/paper/rules.json}
      SERVER_FIX_PERMISSIONS: ${SERVER_FIX_PERMISSIONS:-true}
      SERVER_CHOWN_RECURSIVE: ${SERVER_CHOWN_RECURSIVE:-true}
      APP_UID: ${SERVER_CONTAINER_UID:-1000}
      APP_GID: ${SERVER_CONTAINER_GID:-1000}
      SERVER_STUDY_SALT: ${SERVER_STUDY_SALT:-Continuous_Authentication}
      RULES_VERSION: ${RULES_VERSION:-1}
      INGEST_REQUIRE_AUTH: ${INGEST_REQUIRE_AUTH:-false}
      SERVER_MIN_FREE_BYTES: ${SERVER_MIN_FREE_BYTES:-10485760}
      TIME_SYNC_REGION: ${TIME_SYNC_REGION:-CN}
      TIME_SYNC_NTP_SERVERS: ${TIME_SYNC_NTP_SERVERS:-ntp.aliyun.com,ntp.tencent.com,0.cn.pool.ntp.org,1.cn.pool.ntp.org,2.cn.pool.ntp.org,3.cn.pool.ntp.org}
      TIME_SYNC_MAX_ACCEPTABLE_RTT_MILLIS: ${TIME_SYNC_MAX_ACCEPTABLE_RTT_MILLIS:-3000}
      TZ: ${TZ:-UTC}
    ports:
      - "${SERVER_BIND:-127.0.0.1}:${SERVER_PORT:-8000}:8000"
    volumes: *cca-server-volumes
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
