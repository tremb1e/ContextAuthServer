services:
  contextauth-server-init:
    volumes:
      - ${DATA_VOLUME:-/var/lib/contextauth/data/paper}:/data/paper:rw
      - ${LOG_VOLUME:-/var/log/contextauth}:/app/logs:rw

  contextauth-server:
    image: contextauth/server:${VERSION:-latest}
    pull_policy: missing
    volumes:
      - ${DATA_VOLUME:-/var/lib/contextauth/data/paper}:/data/paper:rw
      - ${LOG_VOLUME:-/var/log/contextauth}:/app/logs:rw
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    restart: always
